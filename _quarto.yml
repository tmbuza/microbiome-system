project:
  type: book
  output-dir: docs

bibliography: library/references.bib
date: last-modified
date-format: "MMM YYYY"

book:
  title: "Microbiome Analysis System"
  subtitle: "From Microbial Communities to Defensible Biological Insights"
  author: "Teresia Mrema Buza | Complex Data Insights"

  chapters:
    - index.qmd
    - 00-preface.qmd

    - part: "Part I: Microbiome Analysis System Foundation"
      chapters:
        - 01-system-overview.qmd
        - 02-study-design-and-metadata.qmd
        - 03-sample-collection-and-sequencing.qmd

    - part: "Part II: Data Acquisition and Quality Control"
      chapters:
        - 04-data-acquisition.qmd
        - 05-quality-control.qmd

    - part: "Part III: Microbiome Feature Generation and Profiling"
      chapters:
        - 06-feature-generation.qmd
        - 07-taxonomic-profiling.qmd
        - 09-functional-profiling.qmd

    - part: "Part IV: Microbiome Statistical Analysis"
      chapters:
        - 08-diversity-analysis.qmd
        - 10-differential-analysis.qmd

    - part: "Part V: Biological Interpretation and Reporting"
      chapters:
        - 11-biological-interpretation.qmd
        - 12-reproducible-reporting.qmd

    - part: "Part VI: Workforce Readiness"
      chapters:
        - 13-workforce-readiness.qmd

  appendices:
    - 999-appendix.qmd
    - 999-references.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    number-depth: 2
    anchor-sections: true
    link-external-icon: true
    css: assets/css/cdi.css
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    smooth-scroll: true
    mermaid:
      theme: forest

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  working-dir: .